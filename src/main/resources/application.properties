# Server
server.port=${SERVER_PORT}

# Database
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=${DB_DRIVER}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO}
spring.jpa.show-sql=${JPA_SHOW_SQL}
spring.jpa.properties.hibernate.dialect=${JPA_DIALECT}
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL}
spring.jpa.open-in-view=${JPA_OPEN_IN_VIEW}

# File Upload
spring.servlet.multipart.max-file-size=${MULTIPART_MAX_FILE_SIZE}
spring.servlet.multipart.max-request-size=${MULTIPART_MAX_REQUEST_SIZE}

# Session & Security
server.servlet.session.cookie.http-only=${SESSION_COOKIE_HTTP_ONLY}
server.servlet.session.cookie.same-site=${SESSION_COOKIE_SAME_SITE}
server.error.include-message=${ERROR_INCLUDE_MESSAGE}